<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>루틴 설정</title>
    <style>
        /* 표를 깔끔하게 보기 위한 최소한의 스타일 */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; width: 150px; }
        .hidden { display: none; }
        /* 탭 버튼 스타일 (선택사항이지만 깔끔하게 보이도록 추가) */
        button { padding: 8px 15px; margin-right: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div>
    <button type="button" onclick="location.href='/dailyLog'">일일 루틴</button>
    <button type="button" onclick="location.href='/routineCycleStatus'">루틴 현황</button>
    <button type="button" style="font-weight: bold;">루틴 설정</button>
</div>

<hr>

<h2>새로운 루틴 등록</h2>

<table>
    <tbody>
    <tr>
        <th>루틴명</th>
        <td><input type="text" id="title" placeholder="예: 아침 조깅"></td>
    </tr>
    <tr>
        <th>루틴 타입</th>
        <td>
            <select id="routineType" onchange="handleTypeChange()">
                <option value="CHECK">단순체크</option>
                <option value="COUNT">횟수</option>
                <option value="TIME">시간</option>
                <option value="DISTANCE">km</option>
            </select>
        </td>
    </tr>
    <tr id="targetValueRow" class="hidden">
        <th>목표 수치</th>
        <td><input type="number" id="targetValue" placeholder="숫자 입력"></td>
    </tr>
    <tr>
        <th>반복 주기</th>
        <td>
            <div id="checkRepeatArea">
                <input type="number" id="intervalWeeks" value="1" min="1" style="width: 50px;"> 주 간격으로 반복
            </div>
            <div id="otherRepeatArea" class="hidden">
                매주 (기본값)
            </div>
        </td>
    </tr>
    <tr>
        <th>수행 요일</th>
        <td>
            <label><input type="checkbox" id="checkAllDays" onclick="toggleAllDays()" checked> 매일</label> |
            <label><input type="checkbox" class="day-checkbox" value="1" onclick="updateAllDaysCheckbox()" checked> 월</label>
            <label><input type="checkbox" class="day-checkbox" value="2" onclick="updateAllDaysCheckbox()" checked> 화</label>
            <label><input type="checkbox" class="day-checkbox" value="3" onclick="updateAllDaysCheckbox()" checked> 수</label>
            <label><input type="checkbox" class="day-checkbox" value="4" onclick="updateAllDaysCheckbox()" checked> 목</label>
            <label><input type="checkbox" class="day-checkbox" value="5" onclick="updateAllDaysCheckbox()" checked> 금</label>
            <label><input type="checkbox" class="day-checkbox" value="6" onclick="updateAllDaysCheckbox()" checked> 토</label>
            <label><input type="checkbox" class="day-checkbox" value="7" onclick="updateAllDaysCheckbox()" checked> 일</label>
        </td>
    </tr>
    <tr>
        <th>시작 주 선택</th>
        <td>
            <input type="week" id="startYmd">
            <span style="font-size: 0.8em; color: gray;">*기본값: 이번 주</span>
        </td>
    </tr>
    </tbody>
</table>

<button type="button" onclick="saveRoutine()" style="padding: 10px 20px; cursor: pointer;">루틴 등록하기</button>

<br><br>
<hr>

<h2>등록된 루틴 리스트</h2>

<table>
    <thead>
    <tr>
        <th>루틴명</th>
        <th>타입</th>
        <th>목표 수치</th>
        <th>반복 주기</th>
        <th>수행 요일</th>
        <th>시작 주</th>
    </tr>
    </thead>
    <tbody id="routineListBody">
    <tr th:if="${#lists.isEmpty(routineList)}" id="emptyMessageRow">
        <td colspan="6" style="text-align: center;">등록된 루틴이 없어! 첫 루틴을 등록해 봐.</td>
    </tr>

    <tr th:unless="${#lists.isEmpty(routineList)}" th:each="routine : ${routineList}">
        <td th:text="${routine.title}">루틴명</td>
        <td th:text="${routine.routineType}">타입</td>
        <td th:text="${routine.targetValue != null ? routine.targetValue : 1}">수치</td>
        <td th:text="${routine.intervalWeeks == 1 ? '매주' : routine.intervalWeeks + '주 간격'}">반복주기</td>
        <td th:text="${routine.daysOfWeek}">월,수,금</td>
        <td th:text="${routine.startYmd}">2026-W14</td>
    </tr>
    </tbody>
</table>

<script>

    // 페이지 로드 시 이번 주 날짜를 기본값으로 세팅 (자바스크립트로 이번 주 ISO 문자열 구하기)
    window.onload = function() {
        toggleAllDays();

        // 적용
        const weekStr = getISOWeekString(new Date());
        document.getElementById('startYmd').value = weekStr;
    };

    // 서버로 데이터 전송 및 리스트 즉시 업데이트 (새로고침 없음!)
    async function saveRoutine() {
        const title = document.getElementById('title').value;
        const routineType = document.getElementById('routineType').value;
        const targetValue = document.getElementById('targetValue').value;
        const startYmd = document.getElementById('startYmd').value;

        let intervalWeeks = 1; // 기본값

        if (routineType === 'CHECK') {
            intervalWeeks = document.getElementById('intervalWeeks').value;
        }

        // 체크된 요일들 배열로 모으기
        const daysOfWeek = [];
        document.querySelectorAll('.day-checkbox:checked').forEach(cb => {
            daysOfWeek.push(cb.value);
        });

        if (!title) {
            alert('루틴명을 입력해 줘!');
            return;
        }
        if (daysOfWeek.length === 0) {
            alert('수행할 요일을 하나 이상 선택해 줘!');
            return;
        }

        // 적용 예시
        const selectedWeek = document.getElementById('startYmd').value; // "2026-W15"
        const formattedDate = getMondayFromWeekStr(selectedWeek); // "2026-04-06" 변환 완료!

        // 서버로 보낼 JSON 데이터 만들기
        const requestData = {
            title: title,
            routineType: routineType,
            targetValue: routineType === 'CHECK' ? 1 : targetValue,
            intervalWeeks: intervalWeeks,
            daysOfWeek: daysOfWeek.join(','),
            startYmd: formattedDate
        };

        try {
            // [서버 API 호출 부분]
            // 실제 백엔드 컨트롤러 경로('/api/routineList')에 맞게 나중에 수정해 줘!
            const response = await fetch('/api/routine/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            });

            if (response.ok) {
                // 서버 저장 성공 시 화면 리스트에 한 줄 추가 (새로고침 안함)
                addRoutineToList(requestData);
                alert('루틴이 등록되었어!');

                // 입력 폼 초기화
                document.getElementById('title').value = '';
                document.getElementById('targetValue').value = '';
                document.getElementById('checkAllDays').checked = false;
                toggleAllDays(); // 요일 체크박스 다 풀기
            } else {
                alert('등록에 실패했어. 다시 시도해 봐.');
            }
        } catch (error) {
            console.error('에러 발생:', error);
            // 프론트엔드 테스트용 (백엔드 없어도 리스트 추가되는 거 보려면 이 부분 주석 해제)
            // addRoutineToList(requestData);
        }
    }



    // [기타 함수 목록]

    // ISO 8601 기준 주차 계산 함수
    function getISOWeekString(date) {
        // 타임존 오차를 막기 위해 UTC 기준으로 날짜 객체 복사
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));

        // 현재 요일 구하기 (월=1 ~ 일=7, 일요일이 0이므로 7로 보정)
        const dayNum = d.getUTCDay() || 7;

        // ISO 표준 기준인 '해당 주의 목요일'로 날짜 이동 (4 = 목요일)
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);

        // 목요일이 속한 연도의 1월 1일 구하기
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));

        // 1월 1일부터 목요일까지 며칠 지났는지 계산 후 7로 나누어 주차 산정
        const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);

        // YYYY-Www 포맷으로 반환 (예: 2026-W15)
        return d.getUTCFullYear() + '-W' + String(weekNo).padStart(2, '0');
    }

    // 'YYYY-Www' 형식을 받아서 그 주의 월요일 날짜 'YYYY-MM-DD'로 반환하는 함수
    function getMondayFromWeekStr(weekStr) {
        if (!weekStr) return null;

        const year = parseInt(weekStr.substring(0, 4));
        const week = parseInt(weekStr.substring(6, 8));

        // ISO 8601 표준 기준: 1월 4일은 무조건 그 해의 1주차에 포함됨
        const jan4 = new Date(year, 0, 4);
        const jan4Day = jan4.getDay() || 7; // 요일 (1:월 ~ 7:일)

        // 1주차의 월요일 날짜 구하기
        const firstMonday = new Date(year, 0, 4 - jan4Day + 1);

        // 타겟 주차(week)만큼 날짜 더하기
        const targetMonday = new Date(firstMonday.getTime() + (week - 1) * 7 * 24 * 60 * 60 * 1000);

        // YYYY-MM-DD 포맷으로 맞추기
        const yyyy = targetMonday.getFullYear();
        const mm = String(targetMonday.getMonth() + 1).padStart(2, '0');
        const dd = String(targetMonday.getDate()).padStart(2, '0');

        return `${yyyy}-${mm}-${dd}`;
    }

    // 루틴 타입 변경 시 입력 폼 제어
    function handleTypeChange() {
        const type = document.getElementById('routineType').value;
        const targetValueRow = document.getElementById('targetValueRow');
        const checkRepeatArea = document.getElementById('checkRepeatArea');
        const otherRepeatArea = document.getElementById('otherRepeatArea');

        if (type === 'CHECK') {
            targetValueRow.classList.add('hidden'); // 목표 수치 숨김
            checkRepeatArea.classList.remove('hidden'); // N주 간격 보임
            otherRepeatArea.classList.add('hidden'); // 매주 고정 숨김
        } else {
            targetValueRow.classList.remove('hidden'); // 목표 수치 보임
            checkRepeatArea.classList.add('hidden'); // N주 간격 숨김
            otherRepeatArea.classList.remove('hidden'); // 매주 고정 보임
        }
    }

    // 매일 체크박스 제어
    function toggleAllDays() {
        const isChecked = document.getElementById('checkAllDays').checked;
        const checkboxes = document.querySelectorAll('.day-checkbox');
        checkboxes.forEach(cb => cb.checked = isChecked);
    }
    // 개별 요일 클릭 시 '매일' 체크박스 상태 자동 변경
    function updateAllDaysCheckbox() {
        const checkAllDays = document.getElementById('checkAllDays');
        const checkboxes = document.querySelectorAll('.day-checkbox');
        const checkedBoxes = document.querySelectorAll('.day-checkbox:checked');

        // 전체 요일 개수(7개)와 현재 체크된 요일 개수가 같으면 '매일' 체크, 아니면 해제
        if (checkboxes.length === checkedBoxes.length) {
            checkAllDays.checked = true;
        } else {
            checkAllDays.checked = false;
        }
    }

    // 표에 새로운 행을 추가하는 함수
    function addRoutineToList(data) {
        const tbody = document.getElementById('routineListBody');

        // "등록된 루틴이 없어!" 메시지가 있으면 지워줌
        const emptyMessage = document.getElementById('emptyMessageRow');
        if (emptyMessage) {
            emptyMessage.remove();
        }

        const tr = document.createElement('tr');

        // 타입별로 보여줄 텍스트 가공
        const targetDisplay = data.routineType === 'CHECK' ? '-' : data.targetValue;
        const repeatDisplay = data.routineType === 'CHECK' ? data.intervalWeeks + '주 간격' : '매주';
        const daysOfWeekDisplay = convertToDays(data.daysOfWeek);

        tr.innerHTML = `
            <td>${data.title}</td>
            <td>${data.routineType}</td>
            <td>${targetDisplay}</td>
            <td>${repeatDisplay}</td>
            <td>${daysOfWeekDisplay}</td>
            <td>${data.startYmd}</td>
        `;

        // 새로 추가된 데이터는 위로 올라오게 표의 맨 첫번째 자리에 삽입
        tbody.insertBefore(tr, tbody.firstChild);
    }

    function convertToDays(str) {
        const dayMap = {
            '1': '월',
            '2': '화',
            '3': '수',
            '4': '목',
            '5': '금',
            '6': '토',
            '7': '일'
        };

        return str.split(',')
        .map(num => dayMap[num.trim()] || num.trim())
        .join(', ');
    }
</script>

</body>
</html>
